---
server:
  port: 8084
spring:
  datasource:
    url: jdbc:postgresql://localhost:5437/idpcore
    username: idpcore
    password: idpcore_password
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      schema: idp_core
  flyway:
    enabled: true
    locations: classpath:db/migration, classpath:db/local
    create-schemas: true
    baseline-on-migrate: true
    validate-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: none # Disable JPA schema auto-generation, use Flyway instead
  security:
    type: oauth2
    oauth2:
      client:
        registration:
          idp-core:
            client-id: local-client-id
            client-secret: local-client-secret
        provider:
          idp-core:
            token-uri: http://localhost:8080/auth/token
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/auth/.well-known/jwks.json
app:
  security:
    mock-enabled: true
  full-refresh-at-startup: true
  idp-core-prefix-url: http://localhost:8084
logging:
  level:
    # Application log level, defaults to INFO. Override per environment via LOG_LEVEL env var.
    com.decathlon: ${LOG_LEVEL:DEBUG}
    # Suppresses noisy Spring context startup logs at WARN level.
    org.springframework.context.support: WARN
    # Suppresses a specific repetitive bean registration delegate log line.
    org.springframework.context.support.PostProcessorRegistrationDelegate: ERROR
    org.hibernate.SQL: WARN
    org.hibernate.stat: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
