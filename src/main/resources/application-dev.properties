# Spring DevTools Configuration for Hot Code Replace
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java,src/main/resources
spring.devtools.restart.exclude=static/**,public/**,resources/**/*.html,**/*.log,**/*.tmp
spring.devtools.livereload.enabled=true
spring.devtools.livereload.port=35729

# Faster restarts - optimized for Java 25
spring.devtools.restart.poll-interval=500ms
spring.devtools.restart.quiet-period=200ms
spring.devtools.restart.trigger-file=.reloadtrigger

# Additional performance tuning
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.springframework.boot.devtools.autoconfigure=DEBUG

# Thymeleaf cache disabled in dev
spring.thymeleaf.cache=false

# Web resources cache disabled
spring.web.resources.cache.period=0

# Additional paths to watch
spring.devtools.restart.additional-exclude=**/logs/**,**/temp/**
