---
spring:
  web:
    resources:
      add-mappings: false
  jackson:
    property-naming-strategy: SNAKE_CASE
  profiles:
    active: ${SPRING_PROFILE:}
  datasource:
    url: jdbc:postgresql://${DATASOURCE_HOST}:${DATASOURCE_PORT}/${DATASOURCE_DB_NAME}?prepareThreshold=0
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      schema: idp_core
  flyway:
    default-schema: idp_core
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  security:
    oauth2:
      client:
        registration:
          idp-core:
            authorization-grant-type: client_credentials
            client-id: ${CLIENT_CREDENTIAL_CLIENT_ID}
        provider:
          idp-core:
            token-uri: ${OAUTH_TOKEN_URI}
      resourceserver:
        jwt:
          jwk-set-uri: ${OAUTH_JWK_URI}
  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: none  # Disable JPA schema auto-generation, use Flyway instead
    properties:
      jakarta.persistence.sharedCache.mode: UNSPECIFIED
      hibernate:
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 500
          batch_versioned_data: true
springdoc:
  swagger-ui:
    tagsSorter: alpha
    disable-swagger-default-url: true
    urls-primary-name: internal
app:
  idp-core-prefix-url: ${IDP_CORE_PREFIX_URL}

logging:
  level:
    com.decathlon: ${LOG_LEVEL:INFO}
    org.springframework.context.support: WARN
    org.springframework.context.support.PostProcessorRegistrationDelegate: ERROR

management:
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include:
            - livenessState
            - db
        readiness:
          include:
            - readinessState
            - db
      show-details: when_authorized
