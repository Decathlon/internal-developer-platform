---

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: idpcore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-idpcore_password}
    ports:
      - "5437:5432"
    volumes:
      - ./scripts/init-extensions.sql:/docker-entrypoint-initdb.d/01-init-extensions.sql:ro
    networks:
      - postgres
    restart: unless-stopped

networks:
  postgres:
    driver: bridge

volumes:
  postgres:
