---
version: "3.8"

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: idpcore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-idpcore_password}
    ports:
      - "5437:5432"
    networks:
      - postgres
    restart: unless-stopped

networks:
  postgres:
    driver: bridge

volumes:
  postgres:
