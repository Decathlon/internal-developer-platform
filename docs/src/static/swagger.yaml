openapi: 3.1.0
info:
  title: Idp core API
  description: API dedicated to idp core functionalities
  version: v1
servers:
  - url: http://localhost:8084
security:
  - clientId: []
  - bearer: []
tags:
  - name: Entity Graph
    description: Entity relationship graph operations
  - name: Inbound Webhook Management
    description: Operations for managing inbound webhook connector configurations
  - name: Entities Management
    description: Operations related to entity management
  - name: Audit
    description: Operations related to audit history
  - name: Entities Templates Management
    description: Operations related to entity template management
  - name: Entity dynamic mapping
    description: Operations related to entity dynamic mapping management
paths:
  '/api/v1/inbound_webhooks/{identifier}':
    get:
      tags:
        - Inbound Webhook Management
      summary: Get a webhook connector by identifier
      description: Retrieve a specific webhook connector using its string identifier
      operationId: getWebhookConnectorByIdentifier
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Webhook connector found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/InboundWebhookDtoOut'
        '404':
          description: Webhook connector not found with the provided identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Inbound Webhook Management
      summary: Update an existing webhook connector by identifier
      description: >-
        Update the details of an existing webhook connector identified by its
        unique string identifier
      operationId: putWebhookConnector
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboundWebhookUpdateDtoIn'
        required: true
      responses:
        '200':
          description: Webhook connector updated successfully
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/InboundWebhookDtoOut'
        '400':
          description: Invalid request payload
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Webhook connector not found with the provided identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Webhook connector name already exists
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Inbound Webhook Management
      summary: Delete a webhook connector by identifier
      description: Remove a webhook connector from the system using its unique identifier
      operationId: deleteWebhookConnector
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Webhook connector deleted successfully
        '404':
          description: Webhook connector not found with the provided identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  '/api/v1/entity_dynamic_mappings/{identifier}':
    get:
      tags:
        - Entity dynamic mapping
      summary: Get an entity dynamic mapping by identifier
      description: Retrieve an entity dynamic mapping using its string identifier
      operationId: getEntityDynamicMappingByIdentifier
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Entity dynamic mapping found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityDynamicMappingDtoOut'
        '404':
          description: Entity dynamic mapping not found with the provided identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Entity dynamic mapping
      summary: Update an existing entity dynamic mapping by identifier
      description: >-
        Update the details of an existing entity dynamic mapping  identified by
        its unique string identifier
      operationId: updateEntityDynamicMapping
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityDynamicMappingUpdateDtoIn'
        required: true
      responses:
        '200':
          description: Entity dynamic mapping updated successfully
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityDynamicMappingDtoOut'
        '400':
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Entity dynamic mapping not found with the provided identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Entity dynamic mapping
      summary: Delete an entity dynamic mapping by identifier
      description: Remove an entity dynamic from the system using its unique identifier
      operationId: deleteEntityDynamicMapping
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Entity dynamic mapping deleted successfully
        '404':
          description: Entity dynamic mapping not found with the provided identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  '/api/v1/entity-templates/{identifier}':
    get:
      tags:
        - Entities Templates Management
      summary: Get template by identifier
      description: Retrieve a specific template using its string identifier
      operationId: getTemplateByIdentifier
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Template found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityTemplateDtoOut'
        '404':
          description: Template not found with the provided identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Entities Templates Management
      summary: Update an existing template by template identifier
      description: >-
        Update the details of an existing template identified by its unique
        string identifier
      operationId: updateTemplate
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityTemplateUpdateDtoIn'
        required: true
      responses:
        '200':
          description: Template update successfully
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityTemplateDtoOut'
        '404':
          description: Template not found with the provided identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Entities Templates Management
      summary: Delete template by identifier
      description: Remove a template from the system using its unique identifier
      operationId: deleteTemplate
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Template deleted successfully
        '404':
          description: Template not found with the provided identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  '/api/v1/entities/{templateIdentifier}/{entityIdentifier}':
    get:
      tags:
        - Entities Management
      summary: Get entity by entity template and identifier
      description: >-
        Retrieve a specific entity using its string identifier and its template
        identifier with configurable relationship graph traversal. Supports
        fetching both inbound and outbound relations up to a specified depth
        using direct lineage mode.
      operationId: getEntity
      parameters:
        - name: templateIdentifier
          in: path
          required: true
          schema:
            type: string
        - name: entityIdentifier
          in: path
          required: true
          schema:
            type: string
        - name: relations_depth
          in: query
          description: >-
            Maximum depth to traverse when collecting entity relations. Defaults
            to 1. Valid range: 1-6.
          required: false
          schema:
            type: integer
            default: 1
        - name: relations_to_display
          in: query
          description: >-
            Comma-separated list of relation names to include in the response.
            When omitted, all relations are included.
          required: false
          schema:
            type: array
            example:
              - depends-on
              - relates-to
      responses:
        '200':
          description: Entity found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityDtoOut'
        '404':
          description: Entity not found with the provided identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Entities Management
      summary: Update an existing entity
      description: Update an existing entity in the system with the provided information
      operationId: updateEntity
      parameters:
        - name: templateIdentifier
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: entityIdentifier
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityUpdateDtoIn'
        required: true
      responses:
        '200':
          description: Entity updated successfully
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityDtoOut'
        '400':
          description: Invalid entity data provided
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Missing or invalid token
        '403':
          description: Insufficient rights
        '404':
          description: Entity not found with the provided identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server-side failure
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Entities Management
      summary: Delete an existing entity
      description: >-
        Delete an entity from the system using its template and entity
        identifiers. This operation removes the entity and automatically cleans
        up any relations from other entities that reference it.
      operationId: deleteEntity
      parameters:
        - name: templateIdentifier
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: entityIdentifier
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '204':
          description: Entity deleted successfully
        '400':
          description: Invalid entity data provided
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Missing or invalid token
        '403':
          description: Insufficient rights
        '404':
          description: Entity not found with the provided identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Target entity has required relations
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server-side failure
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/inbound_webhooks:
    get:
      tags:
        - Inbound Webhook Management
      summary: Get paginated Webhook connectors
      description: Retrieve a paginated list of webhook connectors with optional sorting
      operationId: getWebhooksPaginated
      parameters:
        - name: page
          in: query
          description: Page number for pagination. Defaults to 0.
          content:
            '*/*':
              schema:
                type: integer
                default: '0'
        - name: size
          in: query
          description: Number of items per page. Defaults to 20.
          content:
            '*/*':
              schema:
                type: integer
                default: '20'
        - name: sort
          in: query
          description: >-
            Sorting criteria in the format: property(,asc|desc). Defaults to
            identifier,asc.
          content:
            '*/*':
              schema:
                type: string
                default: 'identifier,asc'
      responses:
        '200':
          description: Paginated webhook connector retrieved successfully
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/WebhookConnectorPageResponse'
        '400':
          description: Invalid pagination parameters
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Inbound Webhook Management
      summary: Create a new webhook connector configuration
      description: >-
        Creates a webhook connector configuration used by the generic inbound
        webhook endpoint
      operationId: createInboundWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboundWebhookCreateDtoIn'
        required: true
      responses:
        '201':
          description: Webhook connector created
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/InboundWebhookDtoOut'
        '400':
          description: Invalid webhook connector data provided
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/InboundWebhookDtoOut'
        '409':
          description: Webhook connector already exists in this entityTemplateIdentifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/InboundWebhookDtoOut'
  /api/v1/entity_dynamic_mappings:
    get:
      tags:
        - Entity dynamic mapping
      summary: Get paginated entity dynamic mappings
      description: >-
        Retrieve a paginated list of entity dynamic mappings with optional
        sorting
      operationId: getEntityDynamicMappingPaginated
      parameters:
        - name: page
          in: query
          description: Page number for pagination. Defaults to 0.
          content:
            '*/*':
              schema:
                type: integer
                default: '0'
        - name: size
          in: query
          description: Number of items per page. Defaults to 20.
          content:
            '*/*':
              schema:
                type: integer
                default: '20'
        - name: sort
          in: query
          description: >-
            Sorting criteria in the format: property(,asc|desc). Defaults to
            identifier,asc.
          content:
            '*/*':
              schema:
                type: string
                default: 'identifier,asc'
      responses:
        '200':
          description: Paginated entity dynamic mapping retrieved successfully
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityDynamicMappingPageResponse'
        '400':
          description: Invalid pagination parameters
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Entity dynamic mapping
      summary: Create entity dynamic mapping
      description: >-
        Creates a new entity dynamic mapping used by the generic inbound webhook
        endpoint
      operationId: createDynamicMapping
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityDynamicMappingCreateDtoIn'
        required: true
      responses:
        '201':
          description: Entity dynamic mapping created
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityDynamicMappingDtoOut'
        '400':
          description: Invalid entity dynamic mapping data provided
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityDynamicMappingDtoOut'
        '409':
          description: Identifier already exists
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityDynamicMappingDtoOut'
  /api/v1/entity-templates:
    get:
      tags:
        - Entities Templates Management
      summary: Get paginated templates
      description: Retrieve a paginated list of templates with optional sorting
      operationId: getTemplatesPaginated
      parameters:
        - name: page
          in: query
          description: Page number for pagination. Defaults to 0.
          content:
            '*/*':
              schema:
                type: integer
                default: '0'
        - name: size
          in: query
          description: Number of items per page. Defaults to 20.
          content:
            '*/*':
              schema:
                type: integer
                default: '20'
        - name: sort
          in: query
          description: >-
            Sorting criteria in the format: property(,asc|desc). Defaults to
            identifier,asc.
          content:
            '*/*':
              schema:
                type: string
                default: 'identifier,asc'
      responses:
        '200':
          description: Paginated templates retrieved successfully
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/TemplatePageResponse'
        '400':
          description: Invalid pagination parameters
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Entities Templates Management
      summary: Create a new template
      description: Create a new template in the system with the provided information
      operationId: createTemplate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityTemplateCreateDtoIn'
        required: true
      responses:
        '201':
          description: Template created successfully
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityTemplateDtoOut'
        '400':
          description: Invalid template data provided
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  '/api/v1/entities/{templateIdentifier}':
    get:
      tags:
        - Entities Management
      summary: Get entities by template identifier
      description: Retrieve a paginated list of entities with optional sorting
      operationId: getEntities
      parameters:
        - name: page
          in: query
          description: Page number for pagination. Defaults to 0.
          required: false
          content:
            '*/*':
              schema:
                type: integer
                default: '0'
        - name: size
          in: query
          description: Number of items per page. Defaults to 20.
          required: false
          content:
            '*/*':
              schema:
                type: integer
                default: '20'
        - name: templateIdentifier
          in: path
          required: true
          schema:
            type: string
        - name: q
          in: query
          description: >
            Optional filter query using a simple expression language. See more
            details in the API documentation. Example: `name:idp` for entities
            with names containing 'idp'.
          required: false
          content:
            '*/*':
              schema:
                type: string
        - name: sort
          in: query
          description: >-
            Sorting criteria in the format: property(,asc|desc). Defaults to
            identifier,asc.
          content:
            '*/*':
              schema:
                type: string
                default: 'identifier,asc'
      responses:
        '200':
          description: Paginated entities retrieved successfully
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityPageResponse'
        '400':
          description: Invalid filter query syntax
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Entities Management
      summary: Create a new entity
      description: Create a new entity in the system with the provided information
      operationId: createEntity
      parameters:
        - name: templateIdentifier
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityCreateDtoIn'
        required: true
      responses:
        '201':
          description: Entity created successfully
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityDtoOut'
        '400':
          description: Invalid entity data provided
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Missing or invalid token
        '403':
          description: Insufficient rights
        '404':
          description: Template not found with the provided identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Entity already exists in this template
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server-side failure
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/entities/search:
    post:
      tags:
        - Entities Management
      summary: Search entities
      description: >-
        Search for entities across all templates using nested filter queries.
        Supports complex logical compositions (AND / OR) of filter criteria on
        template, identifier, name, properties, relations, and reverse
        relations.
      operationId: searchEntities
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntitySearchRequestDtoIn'
        required: true
      responses:
        '200':
          description: Entities retrieved successfully
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityPageResponse'
        '400':
          description: Invalid search filter
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  '/api/v1/entities/{templateIdentifier}/{entityIdentifier}/graph':
    get:
      tags:
        - Entity Graph
      summary: Get entity relationship graph as flat nodes and edges
      description: >-
        Retrieves the entity relationship graph as a flat nodes-and-edges
        structure, suitable for frontend visualization tools such as React Flow,
        Vis.js, and Cytoscape.
      operationId: getEntityGraph
      parameters:
        - name: templateIdentifier
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: entityIdentifier
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: depth
          in: query
          description: >-
            Maximum traversal depth for relationship resolution. Clamped between
            1 and 6.
          required: false
          schema:
            type: integer
            format: int32
            default: 1
        - name: include_data
          in: query
          description: >-
            When true, each graph node includes a data object containing the
            entity's property values. Defaults to false.
          required: false
          schema:
            type: boolean
            default: false
        - name: traversal_mode
          in: query
          description: >-
            Specifies the traversal mode for the entity graph. Defaults to
            DIRECT_LINEAGE.
          required: false
          schema:
            type: string
            default: DIRECT_LINEAGE
            enum:
              - DIRECT_LINEAGE
              - BIDIRECTIONAL
              - OUTBOUND_ONLY
        - name: relations
          in: query
          description: >-
            When provided, only relations whose name matches one of the listed
            values are traversed and included. Omit to include all relations.
          required: false
          schema:
            type: array
            items:
              type: string
        - name: properties
          in: query
          description: >-
            When provided, each node's data object is restricted to the listed
            property names. Requires include_data=true to have any effect. Omit
            to include all properties.
          required: false
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Flat entity graph successfully retrieved
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityGraphFlatDtoOut'
        '404':
          description: Entity not found with the provided identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  '/api/v1/audit/entities/{templateIdentifier}/{entityIdentifier}':
    get:
      tags:
        - Audit
      summary: Get entity audit history
      description: >-
        Retrieve the complete audit history for a specific entity, including all
        revisions with timestamps and modification types
      operationId: getEntityAuditHistory
      parameters:
        - name: templateIdentifier
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: entityIdentifier
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Successfully retrieved entity audit history
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EntityAuditDtoOut'
        '400':
          description: Invalid template or entity identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Missing or invalid token
        '403':
          description: Insufficient rights
        '404':
          description: >-
            Template not found with the provided identifier or Entity not found
            with the provided identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server-side failure
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    InboundWebhookSecurityContractDtoIn:
      type: object
      properties:
        type:
          type: string
          minLength: 1
        config:
          type: object
          additionalProperties:
            type: string
      required:
        - config
        - type
    InboundWebhookUpdateDtoIn:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
          minLength: 0
        description:
          type: string
        enabled:
          type: boolean
        mapping_identifiers:
          type: array
          items:
            type: string
        security:
          $ref: '#/components/schemas/InboundWebhookSecurityContractDtoIn'
      required:
        - name
    EntityDynamicMappingDtoOut:
      type: object
      properties:
        identifier:
          type: string
        entityTemplateIdentifier:
          type: string
        filter:
          type: string
        name:
          type: string
        description:
          type: string
        entity:
          $ref: '#/components/schemas/InboundWebhookEntityMappingDtoOut'
    InboundWebhookDtoOut:
      type: object
      properties:
        identifier:
          type: string
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        mappings:
          type: array
