name: Build and Push to Docker Hub

on: # yamllint disable-line rule:truthy
  release:
    types: [released]  #  Trigger only for stable and public releases
  workflow_dispatch:  # Allow manual triggering of the workflow
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g., v1.0.0)'
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    name: Build and Push Docker Image
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  #  v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag_name }}
      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  #  v5.4.0
        with:
          distribution: 'temurin'
          java-version: 25
          cache: maven
          overwrite-settings: false
      - name: Compile
        id: compile
        run: mvn clean verify
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  #  v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  #  v4.2.0
      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  #  v7.3.0
        with:
          context: .
          push: true
          sbom: true
          provenance: mode=max
          tags: decathlon/internal-developer-platform:${{ github.event.release.tag_name || github.event.inputs.tag_name }},decathlon/internal-developer-platform:latest
      - name: Update repo description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: decathlon/internal-developer-platform
