name: Build and Push to Docker Hub

on: # yamllint disable-line rule:truthy
  release:
    types: [released]  #  Trigger only for stable and public releases
  workflow_dispatch:  # Allow manual triggering of the workflow
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g., v1.0.0)'
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    name: Build and Push Docker Image
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  #  v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag_name }}
      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  #  v5.2.0
        with:
          distribution: 'temurin'
          java-version: 25
          cache: maven
          overwrite-settings: false
      - name: Compile
        id: compile
        run: mvn clean verify
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  #  v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  #  v4.1.0
      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  #  v7.2.0
        with:
          context: .
          push: true
          sbom: true
          provenance: mode=max
          tags: decathlon/internal-developer-platform:${{ github.event.release.tag_name || github.event.inputs.tag_name }},decathlon/internal-developer-platform:latest
      - name: Update repo description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: decathlon/internal-developer-platform
